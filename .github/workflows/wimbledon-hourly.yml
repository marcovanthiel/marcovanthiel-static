name: Wimbledon hourly update

# Elk uur op minuut 7, alleen tijdens het toernooi (t/m 13 juli 2026;
# het script zelf stopt na EINDDATUM, daarna is deze workflow te verwijderen).
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write          # om data.json terug te committen

concurrency:
  group: wimbledon-hourly
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Genereer data.json uit feeds
        id: gen
        run: |
          set -e
          python scripts/wimbledon/update.py | tee /tmp/wimbledon-run.log
          echo "changed=$(git diff --quiet static/wimbledon/data.json && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Commit wijzigingen
        if: steps.gen.outputs.changed == 'true'
        run: |
          git config user.name  "wimbledon-bot"
          git config user.email "bot@marcovanthiel.nl"
          git add static/wimbledon/data.json
          git commit -m "wimbledon: uurlijkse update $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
          echo "✓ gepusht naar main — Cloudflare Pages herbouwt in ~1–2 minuten"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Wimbledon hourly update"
            echo ""
            if [ "${{ steps.gen.outputs.changed }}" = "true" ]; then
              echo "✅ data.json bijgewerkt en gepusht."
            else
              echo "ℹ️  Geen wijzigingen dit uur."
            fi
            echo ""
            echo '```'
            cat /tmp/wimbledon-run.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
