<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Van Thiel Management and Consultancy">
  <defs>
    <linearGradient id="vt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3d5e"/>
      <stop offset="100%" stop-color="#3a8bc4"/>
    </linearGradient>
    <linearGradient id="vt-grad-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a8bc4"/>
      <stop offset="100%" stop-color="#5aa9d9"/>
    </linearGradient>
  </defs>

  <!-- Hoofdtekst "Van Thiel" — typografische wordmark in gradient -->
  <text
    x="0"
    y="200"
    fill="url(#vt-grad)"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="240"
    letter-spacing="-4">Van Thiel</text>

  <!-- Subtekst "Management & Consultancy" — lichter, in caps-stijl -->
  <text
    x="180"
    y="290"
    fill="url(#vt-grad-light)"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="400"
    font-size="64"
    letter-spacing="2">Management &amp; Consultancy</text>

  <!-- Verticale accentbalk rechts (matcht het origineel) -->
  <rect x="1170" y="20" width="14" height="320" fill="url(#vt-grad-light)"/>
</svg>
