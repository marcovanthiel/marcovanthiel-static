<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Oostenrijks paviljoen — SEAWORLD VENICE">
  <defs>
    <linearGradient id="at-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c2a4a"/>
      <stop offset=".55" stop-color="#0a4b6e"/>
      <stop offset="1" stop-color="#062138"/>
    </linearGradient>
    <radialGradient id="at-glow" cx=".5" cy=".35" r=".6">
      <stop offset="0" stop-color="#7be3ff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#7be3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="375" fill="url(#at-bg)"/>
  <rect width="600" height="375" fill="url(#at-glow)"/>
  <!-- water surface lines -->
  <g fill="none" stroke="#7be3ff" stroke-width="1.5" opacity=".55">
    <path d="M20 250 Q 80 240 140 250 T 260 250 T 380 250 T 500 250 T 580 250"/>
    <path d="M20 268 Q 80 260 140 268 T 260 268 T 380 268 T 500 268 T 580 268" opacity=".55"/>
    <path d="M20 285 Q 80 278 140 285 T 260 285 T 380 285 T 500 285 T 580 285" opacity=".35"/>
  </g>
  <!-- church bell with figure as clapper -->
  <g transform="translate(300 140)">
    <path d="M-60 -70 Q -60 -110 0 -110 Q 60 -110 60 -70 L 60 30 L -60 30 Z" fill="#e8d28b" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="-70" y="30" width="140" height="10" fill="#1a1a1a"/>
    <!-- crucifix on top -->
    <rect x="-3" y="-130" width="6" height="22" fill="#1a1a1a"/>
    <rect x="-10" y="-122" width="20" height="6" fill="#1a1a1a"/>
    <!-- figure as clapper -->
    <line x1="0" y1="-60" x2="0" y2="10" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="-2" r="6" fill="#f0c0a0"/>
    <path d="M-3 4 L -3 22 M 3 4 L 3 22" stroke="#f0c0a0" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- robot dog (Cerberus) -->
  <g transform="translate(110 305)">
    <rect x="-20" y="-14" width="40" height="20" rx="3" fill="#1a1a1a"/>
    <rect x="-26" y="-22" width="12" height="14" rx="2" fill="#1a1a1a"/>
    <circle cx="-22" cy="-17" r="2" fill="#ff3030"/>
    <line x1="-14" y1="6" x2="-14" y2="18" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="14" y1="6" x2="14" y2="18" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="-6" y1="6" x2="-6" y2="18" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="6" y1="6" x2="6" y2="18" stroke="#1a1a1a" stroke-width="3"/>
  </g>
  <!-- jetski silhouette -->
  <g transform="translate(470 300)" fill="#1a1a1a">
    <path d="M-50 0 Q -40 -22 -10 -22 L 30 -22 Q 50 -22 55 -6 L 55 4 Q 30 14 -20 14 Q -45 14 -50 0 Z"/>
    <rect x="-2" y="-32" width="6" height="12"/>
    <circle cx="20" cy="-18" r="6" fill="#7be3ff"/>
  </g>
  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#cfe9ff">PAVILION · AT · GIARDINI</text>
  <text x="300" y="350" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#cfe9ff">SEAWORLD VENICE</text>
</svg>
