<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Catalonië paviljoen — Paper Tears">
  <defs>
    <linearGradient id="cat-led" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8e7"/>
      <stop offset="1" stop-color="#9a8a3a"/>
    </linearGradient>
    <pattern id="cat-pixel" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#1a1a1a"/>
      <rect width="2" height="2" x="1" y="1" fill="#f4d04a" opacity=".4"/>
    </pattern>
  </defs>
  <rect width="600" height="375" fill="#0c0c0c"/>
  <!-- LED screen -->
  <rect x="80" y="50" width="440" height="240" fill="url(#cat-pixel)" stroke="#9a8a3a" stroke-width="2"/>
  <!-- watermark imagery: torn paper silhouettes -->
  <g fill="#f4ede1" opacity=".85">
    <path d="M150 90 L 180 70 L 220 110 L 250 80 L 290 130 L 280 180 L 240 220 L 200 200 L 170 240 L 130 200 L 140 150 Z"/>
    <path d="M340 110 L 380 90 L 420 130 L 450 100 L 470 160 L 440 210 L 400 230 L 360 200 L 320 220 L 320 160 Z" opacity=".55"/>
  </g>
  <!-- watermark line "CAT" -->
  <text x="300" y="170" font-family="Georgia, serif" font-weight="900" font-size="64" text-anchor="middle" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity=".65">PAPER</text>
  <text x="300" y="240" font-family="Georgia, serif" font-style="italic" font-size="40" text-anchor="middle" fill="#9a8a3a">tears</text>
  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#f4ede1">PAVILION · CAT · ARSENALE</text>
  <text x="80" y="320" font-family="monospace" font-size="11" letter-spacing="2" fill="#9a8a3a">15TH-CENTURY WATERMARKS · LED INSTALLATION</text>
</svg>
