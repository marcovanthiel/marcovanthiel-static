<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Duits paviljoen — Naumann &amp; Tieu">
  <defs>
    <pattern id="de-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#e9e3d6"/>
      <path d="M0 0 L30 0 M0 0 L0 30" stroke="#1a1a1a" stroke-width=".4"/>
    </pattern>
  </defs>
  <rect width="600" height="375" fill="url(#de-grid)"/>
  <!-- big black ledger band -->
  <rect y="0" width="600" height="60" fill="#1a1a1a"/>
  <rect y="315" width="600" height="60" fill="#c1121f"/>
  <rect y="60" width="600" height="20" fill="#d6a31a"/>
  <!-- file cabinet -->
  <g transform="translate(120 120)">
    <rect width="160" height="180" fill="#9aa0a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect y="0" width="160" height="36" fill="#7a8088" stroke="#1a1a1a" stroke-width="2"/>
    <rect y="36" width="160" height="36" fill="#8a9098" stroke="#1a1a1a" stroke-width="2"/>
    <rect y="72" width="160" height="36" fill="#7a8088" stroke="#1a1a1a" stroke-width="2"/>
    <rect y="108" width="160" height="36" fill="#8a9098" stroke="#1a1a1a" stroke-width="2"/>
    <rect y="144" width="160" height="36" fill="#7a8088" stroke="#1a1a1a" stroke-width="2"/>
    <!-- handles -->
    <g fill="#1a1a1a">
      <rect x="65" y="14" width="30" height="6"/>
      <rect x="65" y="50" width="30" height="6"/>
      <rect x="65" y="86" width="30" height="6"/>
      <rect x="65" y="122" width="30" height="6"/>
      <rect x="65" y="158" width="30" height="6"/>
    </g>
  </g>
  <!-- chair (DDR-style) -->
  <g transform="translate(360 130)">
    <rect width="120" height="14" fill="#7d3a1a" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="10" y="14" width="6" height="80" fill="#7d3a1a" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="104" y="14" width="6" height="80" fill="#7d3a1a" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="0" y="-50" width="120" height="14" fill="#7d3a1a" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="0" y="-36" width="14" height="50" fill="#7d3a1a" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="106" y="-36" width="14" height="50" fill="#7d3a1a" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="30" y="40" font-family="monospace" font-size="11" letter-spacing="3" fill="#f4ede1">PAVILION · DE · GIARDINI</text>
  <text x="120" y="355" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#f4ede1">Naumann × Tieu — Systeme der Ordnung</text>
</svg>
