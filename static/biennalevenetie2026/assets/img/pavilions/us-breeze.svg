<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="VS paviljoen — Call Me the Breeze">
  <defs>
    <radialGradient id="us-bg" cx=".4" cy=".3" r=".9">
      <stop offset="0" stop-color="#f4ede1"/>
      <stop offset=".7" stop-color="#cdb89c"/>
      <stop offset="1" stop-color="#7a6a4e"/>
    </radialGradient>
    <linearGradient id="us-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a4f3a"/>
      <stop offset="1" stop-color="#2a2218"/>
    </linearGradient>
  </defs>
  <rect width="600" height="375" fill="url(#us-bg)"/>
  <!-- horizon -->
  <line x1="0" y1="285" x2="600" y2="285" stroke="#1a1a1a" stroke-width=".8" opacity=".4"/>
  <!-- organic blob sculpture -->
  <g transform="translate(300 220)">
    <path d="M-110 0 C -120 -80 -60 -130 0 -120 C 80 -110 130 -60 110 20 C 90 90 30 110 -30 100 C -90 90 -100 60 -110 0 Z"
          fill="url(#us-stone)" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- holes/channels -->
    <ellipse cx="-30" cy="-40" rx="30" ry="20" fill="#cdb89c" opacity=".7"/>
    <ellipse cx="50" cy="20" rx="20" ry="14" fill="#cdb89c" opacity=".5"/>
    <!-- highlight -->
    <path d="M-90 -60 C -100 -100 -40 -120 -10 -110" stroke="#f4ede1" stroke-width="2" fill="none" opacity=".7"/>
  </g>
  <!-- breeze lines -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1" opacity=".4">
    <path d="M40 80 Q 100 70 160 80 T 280 80"/>
    <path d="M340 60 Q 400 50 460 60 T 580 60"/>
    <path d="M480 320 Q 540 310 600 320"/>
  </g>
  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#1a1a1a">PAVILION · US · GIARDINI</text>
  <text x="300" y="355" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#1a1a1a" text-anchor="middle">Alma Allen — Call Me the Breeze</text>
</svg>
