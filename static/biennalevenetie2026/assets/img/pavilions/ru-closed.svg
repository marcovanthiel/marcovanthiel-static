<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Russisch paviljoen — gesloten">
  <defs>
    <linearGradient id="ru-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2418"/>
      <stop offset="1" stop-color="#0c0a06"/>
    </linearGradient>
  </defs>
  <rect width="600" height="375" fill="url(#ru-bg)"/>
  <!-- pavilion silhouette (Shchusev tower) -->
  <g fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1">
    <rect x="120" y="160" width="360" height="160"/>
    <polygon points="120,160 300,80 480,160"/>
    <rect x="270" y="120" width="60" height="80"/>
    <polygon points="270,120 300,90 330,120"/>
  </g>
  <!-- boarded windows -->
  <g fill="#5a3a1a" stroke="#1a1a1a" stroke-width="1">
    <rect x="160" y="200" width="80" height="100"/>
    <rect x="360" y="200" width="80" height="100"/>
  </g>
  <g stroke="#7a4a1a" stroke-width="6">
    <line x1="160" y1="220" x2="240" y2="220"/>
    <line x1="160" y1="260" x2="240" y2="260"/>
    <line x1="200" y1="200" x2="200" y2="300"/>
    <line x1="360" y1="220" x2="440" y2="220"/>
    <line x1="360" y1="260" x2="440" y2="260"/>
    <line x1="400" y1="200" x2="400" y2="300"/>
  </g>
  <!-- caution tape across -->
  <g transform="translate(300 220) rotate(-6)">
    <rect x="-220" y="-14" width="440" height="28" fill="#f4d04a"/>
    <text x="0" y="6" font-family="monospace" font-weight="900" font-size="16" letter-spacing="6" text-anchor="middle" fill="#1a1a1a">CHIUSO · CLOSED · ЗАКРЫТО · GESCHLOSSEN · 关闭</text>
  </g>
  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#f4ede1">PAVILION · RU · GIARDINI</text>
  <text x="300" y="355" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#cdb89c" text-anchor="middle">The Tree is Rooted in the Sky — closed to the public</text>
</svg>
