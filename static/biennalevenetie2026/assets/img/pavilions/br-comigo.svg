<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Brazilië paviljoen — Comigo ninguém pode">
  <defs>
    <radialGradient id="br-bg" cx=".3" cy=".3" r=".9">
      <stop offset="0" stop-color="#f6c02b"/>
      <stop offset=".55" stop-color="#2e7d2e"/>
      <stop offset="1" stop-color="#0a3a0a"/>
    </radialGradient>
    <pattern id="br-weave" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#7d3a1a"/>
      <path d="M0 7 L14 7 M7 0 L7 14" stroke="#f1d29b" stroke-width="1.4"/>
      <circle cx="7" cy="7" r="1.6" fill="#f1d29b"/>
    </pattern>
  </defs>
  <rect width="600" height="375" fill="url(#br-bg)"/>
  <!-- woven panel -->
  <rect x="80" y="60" width="200" height="270" fill="url(#br-weave)" stroke="#1a1a1a" stroke-width="2"/>
  <!-- ceramic vase -->
  <g transform="translate(420 220)">
    <path d="M-60 -100 Q -50 -110 -30 -110 L 30 -110 Q 50 -110 60 -100 Q 70 -50 50 0 Q 70 60 30 90 L -30 90 Q -70 60 -50 0 Q -70 -50 -60 -100 Z"
          fill="#e6d4b8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- decoration motifs -->
    <g fill="#7d3a1a">
      <circle cx="-20" cy="-50" r="6"/>
      <circle cx="20" cy="-50" r="6"/>
      <path d="M-30 0 Q 0 -20 30 0 Q 0 20 -30 0 Z"/>
      <circle cx="-15" cy="50" r="4"/>
      <circle cx="15" cy="50" r="4"/>
    </g>
  </g>
  <!-- root motif -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none" opacity=".6">
    <path d="M120 340 Q 140 300 160 320 Q 180 340 200 310"/>
    <path d="M260 340 Q 280 310 310 320"/>
  </g>
  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#f1d29b">PAVILION · BR · GIARDINI</text>
  <text x="80" y="355" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#f1d29b">Rosana Paulino &amp; Adriana Varejão</text>
</svg>
