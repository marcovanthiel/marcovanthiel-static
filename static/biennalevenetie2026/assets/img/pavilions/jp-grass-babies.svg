<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Japans paviljoen — Grass Babies, Moon Babies">
  <defs>
    <linearGradient id="jp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d5d5"/>
      <stop offset=".5" stop-color="#f0a3a3"/>
      <stop offset="1" stop-color="#8b3a4a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="375" fill="url(#jp-bg)"/>
  <!-- moon -->
  <circle cx="475" cy="100" r="55" fill="#fff8e0" opacity=".95"/>
  <circle cx="465" cy="92" r="6" fill="#e8d8a8" opacity=".5"/>
  <circle cx="490" cy="115" r="4" fill="#e8d8a8" opacity=".5"/>
  <!-- grass blades along bottom -->
  <g fill="none" stroke="#3a5a2a" stroke-width="3" stroke-linecap="round">
    <path d="M30 360 Q 32 320 40 300"/>
    <path d="M80 360 Q 70 320 85 305"/>
    <path d="M130 360 Q 135 325 122 305"/>
    <path d="M540 360 Q 538 320 548 300"/>
    <path d="M510 360 Q 515 325 503 305"/>
    <path d="M470 360 Q 472 325 480 305"/>
  </g>
  <!-- babies in a row, each with sunglasses, reflective -->
  <g transform="translate(120 260)">
    <g>
      <ellipse cx="0" cy="0" rx="22" ry="26" fill="#f4d5b0"/>
      <rect x="-18" y="-8" width="36" height="9" rx="2" fill="#1a1a1a"/>
      <rect x="-14" y="-6" width="10" height="5" fill="#7be3ff"/>
      <rect x="4" y="-6" width="10" height="5" fill="#7be3ff"/>
      <path d="M-10 8 Q 0 14 10 8" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    </g>
    <g transform="translate(90 0)">
      <ellipse cx="0" cy="0" rx="22" ry="26" fill="#f4d5b0"/>
      <rect x="-18" y="-8" width="36" height="9" rx="2" fill="#1a1a1a"/>
      <rect x="-14" y="-6" width="10" height="5" fill="#ffd166"/>
      <rect x="4" y="-6" width="10" height="5" fill="#ffd166"/>
      <path d="M-10 8 Q 0 14 10 8" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    </g>
    <g transform="translate(180 0)">
      <ellipse cx="0" cy="0" rx="22" ry="26" fill="#f4d5b0"/>
      <rect x="-18" y="-8" width="36" height="9" rx="2" fill="#1a1a1a"/>
      <rect x="-14" y="-6" width="10" height="5" fill="#a5e88a"/>
      <rect x="4" y="-6" width="10" height="5" fill="#a5e88a"/>
      <path d="M-10 8 Q 0 14 10 8" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
