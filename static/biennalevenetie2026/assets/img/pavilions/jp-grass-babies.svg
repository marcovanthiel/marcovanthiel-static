  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#1a1a1a">PAVILION · JP · GIARDINI</text>
  <text x="300" y="345" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#3a1a22">Grass Babies, Moon Babies</text>
