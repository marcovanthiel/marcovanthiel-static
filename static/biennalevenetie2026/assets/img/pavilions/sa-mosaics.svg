<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Saoedisch paviljoen — 23 destroyed mosaics">
  <defs>
    <linearGradient id="sa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c994"/>
      <stop offset=".55" stop-color="#b58a52"/>
      <stop offset="1" stop-color="#6e4a28"/>
    </linearGradient>
  </defs>
  <rect width="600" height="375" fill="url(#sa-bg)"/>
