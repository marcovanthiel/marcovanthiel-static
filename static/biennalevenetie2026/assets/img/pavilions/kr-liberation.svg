<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" role="img" aria-label="Zuid-Korea paviljoen — Liberation Space">
  <defs>
    <linearGradient id="kr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ede1"/>
      <stop offset=".55" stop-color="#cc2a2a"/>
      <stop offset="1" stop-color="#0a1a3a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="375" fill="url(#kr-bg)"/>
  <!-- nest weaving -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity=".8">
    <ellipse cx="300" cy="250" rx="220" ry="60"/>
    <ellipse cx="300" cy="250" rx="180" ry="48"/>
    <ellipse cx="300" cy="250" rx="140" ry="36"/>
    <ellipse cx="300" cy="250" rx="100" ry="24"/>
  </g>
  <!-- fortress walls -->
  <g fill="#1a1a1a">
    <rect x="100" y="140" width="20" height="120"/>
    <rect x="480" y="140" width="20" height="120"/>
    <!-- battlements -->
    <rect x="100" y="125" width="20" height="20"/>
    <rect x="130" y="125" width="20" height="20"/>
    <rect x="160" y="125" width="20" height="20"/>
    <rect x="450" y="125" width="20" height="20"/>
    <rect x="480" y="125" width="20" height="20"/>
    <rect x="420" y="125" width="20" height="20"/>
  </g>
  <!-- taegeuk yin-yang -->
  <g transform="translate(300 170)">
    <circle r="48" fill="#f4ede1" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M0 -48 A48 48 0 0 1 0 48 A24 24 0 0 0 0 0 A24 24 0 0 1 0 -48 Z" fill="#cc2a2a"/>
    <path d="M0 48 A48 48 0 0 1 0 -48 A24 24 0 0 0 0 0 A24 24 0 0 1 0 48 Z" fill="#1a3a82"/>
  </g>
  <text x="30" y="32" font-family="monospace" font-size="11" letter-spacing="3" fill="#f4ede1">PAVILION · KR · GIARDINI</text>
  <text x="200" y="345" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#f4ede1">Liberation Space — fortress &amp; nest</text>
</svg>
