<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-label="Cover — In Minor Keys">
  <defs>
    <radialGradient id="cv-bg" cx=".3" cy=".2" r="1">
      <stop offset="0" stop-color="#a51a1a"/>
      <stop offset=".4" stop-color="#7a1a1a"/>
      <stop offset=".75" stop-color="#1c3a5e"/>
      <stop offset="1" stop-color="#0c1622"/>
    </radialGradient>
    <pattern id="cv-noise" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="rgba(0,0,0,0)"/>
      <circle cx="1" cy="1" r=".4" fill="#fff" opacity=".05"/>
    </pattern>
  </defs>
  <rect width="600" height="750" fill="url(#cv-bg)"/>
  <rect width="600" height="750" fill="url(#cv-noise)"/>
  <!-- musical staff lines -->
  <g stroke="#f5e9c8" stroke-width="1" opacity=".3">
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
  </g>
  <!-- minor key signature flats -->
  <g fill="#f5e9c8" font-family="serif" font-size="80">
    <text x="60" y="295" opacity=".7">♭</text>
    <text x="100" y="275" opacity=".7">♭</text>
    <text x="140" y="305" opacity=".7">♭</text>
  </g>
  <!-- crescent / Venetian moon -->
  <circle cx="450" cy="170" r="60" fill="#f5e9c8" opacity=".85"/>
  <circle cx="430" cy="160" r="60" fill="#7a1a1a"/>
  <!-- title -->
  <g font-family="Georgia, 'Bodoni 72', serif" fill="#f5e9c8">
    <text x="300" y="500" text-anchor="middle" font-size="22" letter-spacing="6">61 · LA BIENNALE DI VENEZIA</text>
    <text x="300" y="600" text-anchor="middle" font-weight="900" font-size="96" font-style="normal">In Minor</text>
    <text x="300" y="690" text-anchor="middle" font-style="italic" font-size="96">Keys</text>
  </g>
  <text x="300" y="730" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="6" fill="#f5e9c8" opacity=".7">KOYO KOUOH · 6 MAY – 22 NOV 2026</text>
</svg>
