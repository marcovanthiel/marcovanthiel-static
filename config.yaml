baseURL: "https://marcovanthiel.nl/"
languageCode: "nl"
title: "Marco van Thiel"
theme: "marcotheme"

# Verberg de Hugo-versie uit de generator-meta-tag (kleine attack-surface).
disableHugoGeneratorInject: true

# Sta inline-HTML in markdown toe (nodig voor het contactformulier).
markup:
  goldmark:
    renderer:
      unsafe: true

# Multilingual settings
defaultContentLanguage: "nl"
defaultContentLanguageInSubdir: false
languages:
  nl:
    languageName: "Nederlands"
    weight: 1
    contentDir: "content/nl"
    title: "Marco van Thiel — Interim CIO & Programmamanager Nijmegen"
    params:
      description: "Senior programmamanager en interim CIO uit Nijmegen — 20+ jaar ervaring met fusies, carve-outs en organisatietransities in onderwijs, zorg en industrie."
  en:
    languageName: "English"
    weight: 2
    contentDir: "content/en"
    languageCode: "en"
    title: "Marco van Thiel — Interim CIO & Program Manager Nijmegen"
    params:
      description: "Senior program manager and interim CIO based in Nijmegen — 20+ years of experience with mergers, carve-outs and organisational transitions in education, healthcare and industry."
  de:
    languageName: "Deutsch"
    weight: 3
    contentDir: "content/de"
    languageCode: "de"
    title: "Marco van Thiel — Interim-CIO & Programmmanager Nijmegen"
    params:
      description: "Senior-Programmmanager und Interim-CIO aus Nijmegen — 20+ Jahre Erfahrung mit Fusionen, Carve-outs und Organisationstransformation in Bildung, Gesundheitswesen und Industrie."
  it:
    languageName: "Italiano"
    weight: 4
    contentDir: "content/it"
    languageCode: "it"
    title: "Marco van Thiel — Interim CIO & Program Manager Nijmegen"
    params:
      description: "Senior program manager e CIO interim a Nijmegen — oltre 20 anni di esperienza in fusioni, carve-out e transizioni organizzative in istruzione, sanità e industria."
  cn:
    languageName: "中文"
    weight: 5
    contentDir: "content/cn"
    # `cn` blijft het URL-prefix (al bekend bij zoekmachines), maar het
    # taalattribuut wijst correct naar Mandarijn (zh-CN), niet naar het
    # land "China" — dat scheelt rare hreflang-warnings in Search Console.
    languageCode: "zh-CN"
    title: "Marco van Thiel — 临时 CIO 与项目集经理（奈梅亨）"
    params:
      description: "驻奈梅亨的资深项目集经理与临时 CIO，拥有 20 多年合并、剥离和组织转型经验，覆盖教育、医疗与工业领域。"

# Site parameters
params:
  version: "1.17.7"
  author: "Marco van Thiel"
  description: "Marco van Thiel - Interim manager, CIO, Programmamanager en Projectmanager"
  mainSections: ["posts"]
  # Standaard-afbeelding voor sociale-deel-previews (LinkedIn / WhatsApp /
  # iMessage). Pad relatief aan static/. 1200×630 PNG, gegenereerd uit
  # static/images/og-cover.svg via:
  #   rsvg-convert -w 1200 -h 630 static/images/og-cover.svg -o static/images/og-cover.png
  ogImage: "/images/og-cover.png"
  contact:
    email: "marco@marcovanthiel.nl"
    phone: "+31 (0)6 54 211 659"
    linkedin: "https://www.linkedin.com/in/marcovanthiel/"
    address: "Nijmegen, Nederland"
    # Locatie-gegevens voor LocalBusiness/Person schema en lokale SEO.
    locality: "Nijmegen"
    region: "Gelderland"
    country: "NL"
  # URL naar de kunstcollectie-frontend (custom subdomein voor CTA-links).
  kunstcollectieUrl: "https://kunstcollectie.marcovanthiel.nl"
  # URL naar de kunstcollectie-backend API (Render-service zonder custom domein).
  kunstcollectieApiUrl: "https://api.kunstcollectie.marcovanthiel.nl"

# Menu configuration will be added later

# Sta os.Getenv toe voor de Cloudflare Pages build-commit (voor het versienummer
# in de footer). Naast Hugo's standaard-allowlist (^HUGO_, ^CI$).
security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^CF_PAGES'
